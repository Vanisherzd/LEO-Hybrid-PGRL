# Online GRPO Training Configuration

# Model (must match pretrained)
model:
  orbital_elem_dim: 6
  hidden_dim: 256
  num_layers: 6
  fourier_features: 128

# GRPO Agent
grpo:
  learning_rate: 1.0e-4
  gamma: 0.99
  lambda_: 0.95
  kl_target: 0.01
  kl_beta: 2.0
  gradient_bound: 0.1
  entropy_coef: 1.0e-4
  error_threshold_m: 5.0

# TDMA Protocol
tdma:
  frame_duration_s: 1.0
  num_iot_slots: 32
  num_priority_slots: 2
  beacon_duration_s: 0.01
  priority_slot_duration_s: 0.02
  iot_slot_duration_s: 0.005
  carrier_frequency_ghz: 2.0
  bandwidth_mhz: 1.0
  min_snr_db: 3.0

# Training
training:
  num_frames: 100
  num_passes: 10
  num_stations: 32
  grpo_lr: 1.0e-4

# Satellite
satellite:
  altitude_km: 400
  inclination_deg: 53.0

# Paths
pretrained_path: outputs/pretrain/best_model.pt
output_dir: outputs/online_grpo