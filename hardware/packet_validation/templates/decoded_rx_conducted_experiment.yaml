# Conducted decoded-RX experiment. Computes PDR/PER from a decoded RX log.
# Requires the runner --armed flag (hardware mode) and a real decoded RX log
# (formats A/B/C/JSONL). Conducted/shielded ONLY; no OTA.
run_id: hw_decoded_rx_001
mode: decoded_rx
n_packets: 100
seed: 42
safety:
  conducted_or_shielded: true
  acknowledged_by: REPLACE_WITH_OPERATOR
tx:
  backend: lr1121_uart               # real TX; requires --armed + --i-have-hardware
  freq_hz: 868000000
  power_dbm: 10
rx:
  backend: log_parser
  rx_log_path: REPLACE_WITH_DECODED_RX_LOG_PATH
