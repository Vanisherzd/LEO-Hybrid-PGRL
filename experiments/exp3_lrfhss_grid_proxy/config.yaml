experiment: exp3_lrfhss_grid_proxy
description: >
  LR-FHSS-inspired frequency-grid proxy: measures hopping-bin alignment error,
  orthogonality score, and collision proxy under residual Doppler.
lr_fhss_params:
  num_bins: 64
  num_hops: 84
  hop_length_ms: 6
  bandwidth_khz: 200
  num_time_slots: 32
residual_doppler_hz: [0, 50, 100, 200, 300, 500, 1000]
baselines:
  - name: no_compensation
    description: Uncompensated residual Doppler
  - name: sgp4_compensation
    description: SGP4-based Doppler pre-compensation
  - name: pgrl_compensation
    description: PGRL-predicted Doppler pre-compensation
  - name: oracle_compensation
    description: Oracle (true) Doppler compensation
output:
  results_json: experiments/exp3_lrfhss_grid_proxy/results.json
  figures_dir: experiments/exp3_lrfhss_grid_proxy/figures
  paper_figure: experiments/exp3_lrfhss_grid_proxy/figures/fig4_lrfhss_grid_proxy.png